<!DOCTYPE html>
<html>
<head>
  <title>MARS KNB</title>
  <style>
    body { 
      margin: 0; 
      background: #fff; 
      font-family: Arial, sans-serif; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden;
    }
    .container { text-align: center; }
    .image-container { 
      position: relative; 
      width: 280px; 
      height: 280px; 
      margin: 0 auto; 
    }
    img { 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      object-fit: cover; 
      box-shadow: 0 0 30px rgba(255, 107, 0, 0.4);
    }
    .circle { 
      position: absolute; 
      top: -15px; 
      left: -15px; 
      width: 310px; 
      height: 310px; 
      border-radius: 50%; 
      background: conic-gradient(#ff6b00 0deg 0deg, transparent 0deg 360deg); 
      animation: fill 3s linear forwards; 
    }
    .loading-text { 
      margin-top: 35px; 
      font-style: italic; 
      color: #666; 
      font-size: 19px; 
    }
    .check { 
      display: none; 
      font-size: 110px; 
      color: #00c853; 
      margin-top: 20px; 
    }
    @keyframes fill { 
      to { background: conic-gradient(#ff6b00 0deg 360deg, transparent 360deg); } 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img src="bum.png" id="photo">
      <div class="circle" id="circle"></div>
    </div>
    <div class="loading-text" id="text">Carregando...</div>
    <div class="check" id="check">✅</div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('photo').style.opacity = '0';
      document.getElementById('text').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('photo').style.display = 'none';
        document.getElementById('text').style.display = 'none';
        document.getElementById('check').style.display = 'block';
      }, 800);
    }, 3100);
  </script>
</body>
</html>
