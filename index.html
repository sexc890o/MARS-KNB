body {
  background: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  font-family: Georgia, serif;
}

.loader-wrap {
  position: relative;
  width: 290px;
  height: 290px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1),
              height 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* SVG ring */
.progress-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  transition: all 0.6s cubic-bezier(0.4,0,0.2,1);
}

.track {
  fill: none;
  stroke: #f0f0f0;
  stroke-width: 6;
  transition: opacity 0.4s ease;
}

.fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 848;
  stroke-dashoffset: 848;
  animation: fillRing 3s ease-in-out forwards;
  transition: stroke 0.4s ease, stroke-width 0.4s ease, stroke-dashoffset 0.4s ease;
}

@keyframes fillRing {
  0%   { stroke-dashoffset: 848; }
  100% { stroke-dashoffset: 0; }
}

/* Photo */
.photo {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 1;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.photo.hide {
  opacity: 0;
  transform: scale(0.88);
  pointer-events: none;
}

/* Check (inside large circle) */
.check-inside {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
}

.check-inside.show {
  opacity: 1;
  transform: scale(1);
}

.check-mark {
  fill: none;
  stroke: #22c55e;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 80;
  stroke-dashoffset: 80;
  transition: stroke-dashoffset 0.5s ease 0.1s;
}

.check-mark.draw {
  stroke-dashoffset: 0;
}

/* Label */
.label {
  font-style: italic;
  font-size: 15px;
  color: #bbb;
  letter-spacing: 0.5px;
  transition: opacity 0.5s ease;
}

.label.hide { opacity: 0; }

  <script>
    const photo       = document.getElementById('photo');
    const checkInside = document.getElementById('checkInside');
    const checkMark   = document.getElementById('checkMark');
    const label       = document.getElementById('label');
    const loaderWrap  = document.getElementById('loaderWrap');
    const fillCircle  = document.getElementById('fillCircle');
    const trackCircle = document.getElementById('trackCircle');
    const progressSvg = document.getElementById('progressSvg');

    // Step 1 — ring finishes at 3s
    setTimeout(() => {

      // Fade out photo + label
      photo.classList.add('hide');
      label.classList.add('hide');

      // Step 2 — show check inside big circle
      setTimeout(() => {
        checkInside.classList.add('show');
        setTimeout(() => checkMark.classList.add('draw'), 150);

        // Step 3 — shrink circle + turn green
        setTimeout(() => {
          // Hide track ring (no more gray)
          trackCircle.style.opacity = '0';

          // Turn fill green
          fillCircle.setAttribute('stroke', 'url(#ringGreen)');
          fillCircle.style.strokeWidth = '5';

          // Shrink the whole wrapper
          loaderWrap.style.width  = '88px';
          loaderWrap.style.height = '88px';

          // Scale SVG viewBox effect via transform
          progressSvg.style.transform = 'rotate(-90deg) scale(1)';

        }, 600);

      }, 450);

    }, 3000);
  </script>
