<!DOCTYPE html> 
<html>
<head>
  <title>MARS KNB</title>
  <style>
    body { margin: 0; background: #000; font-family: Arial, sans-serif; overflow: hidden; }
    .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .image-container { position: relative; width: 280px; height: 280px; }
    img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; transition: all 0.6s ease; }
    .circle { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#ff6b00 0% 0%, transparent 0%); transition: all 4s linear; }
    .loading-text { color: #666; font-style: italic; margin-top: 30px; font-size: 18px; opacity: 0.6; }
    .check { display: none; font-size: 90px; color: #00ff9d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img id="photo" src="bum.png">
      <div class="circle" id="progress"></div>
    </div>
    <div class="loading-text" id="text">Carregando...</div>
    <div class="check" id="check">✅</div>
  </div>

  <script>
    const progress = document.getElementById('progress');
    const text = document.getElementById('text');
    const photo = document.getElementById('photo');
    const check = document.getElementById('check');

    setTimeout(() => {
      progress.style.background = 'conic-gradient(#ff6b00 0% 100%, transparent 100%)';
    }, 100);

    setTimeout(() => {
      photo.style.opacity = '0';
      text.style.opacity = '0';
      
      setTimeout(() => {
        photo.style.display = 'none';
        check.style.display = 'block';
        text.style.display = 'none';
      }, 600);
    }, 4200);
  </script>
</body>
</html>
