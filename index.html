<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARS KNB</title>
  <style>
    body { margin:0; background:#fff; height:100vh; overflow:hidden; font-family:Arial, sans-serif; }
    
    #splash {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
    }
    .loader-wrap { position:relative; width:260px; height:260px; margin:0 auto; }
    .photo { width:100%; height:100%; border-radius:50%; object-fit:cover; }
    .progress-svg { position:absolute; top:-15px; left:-15px; width:290px; height:290px; transform:rotate(-90deg); }
    .track { fill:none; stroke:#f0f0f0; stroke-width:14; }
    .fill { fill:none; stroke:#ff6b00; stroke-width:14; stroke-linecap:round; animation:fillRing 3s ease-in-out forwards; }
    @keyframes fillRing { to { stroke-dashoffset:0; } }
    .label { font-style:italic; color:#888; font-size:18px; }

    #chat { display:none; height:100vh; flex-direction:column; }
    .messages { flex:1; padding:20px; overflow-y:auto; background:#f8f8f8; }
    .input-area { padding:15px; background:white; border-top:1px solid #ddd; }
    input { width:100%; padding:15px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
    .msg { margin:12px 0; padding:12px 16px; border-radius:12px; max-width:80%; }
    .user { background:#007bff; color:white; margin-left:auto; }
    .ai { background:#e5e5e5; }
  </style>
</head>
<body>

  <div id="splash">
    <div class="loader-wrap">
      <svg class="progress-svg" viewBox="0 0 290 290">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b00"/>
            <stop offset="100%" stop-color="#e63939"/>
          </linearGradient>
        </defs>
        <circle class="track" cx="145" cy="145" r="135"/>
        <circle class="fill" cx="145" cy="145" r="135" stroke-dasharray="848" stroke-dashoffset="848"/>
      </svg>
      <img class="photo" src="bum.png">
    </div>
    <p class="label">Carregando…</p>
  </div>

  <div id="chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
    </div>
  </div>

    <script>
  const API_KEY = "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";

  // Troca de tela depois do loading
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }, 3300);

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.textContent = text;
    document.getElementById("messages").appendChild(div);
    div.scrollIntoView({behavior: "smooth"});
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const thinking = document.createElement("div");
    thinking.className = "msg ai";
    thinking.textContent = "Pensando...";
    document.getElementById("messages").appendChild(thinking);

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama3-8b-8192",
          messages: ,
          temperature: 0.7,
          max_tokens: 800
        })
      });

      const data = await res.json();
      const reply = data.choices[0].message.content;

      thinking.remove();
      addMessage(reply, "ai");
    } catch (e) {
      thinking.textContent = "Erro ao conectar. Verifique sua chave.";
      console.error(e);
    }
  }
</script>
</body>
</html>
