<!DOCTYPE html>
<html>
<head>
  <title>MARS KNB</title>
  <style>
    body { margin:0; background:white; height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { text-align:center; }
    .image-container { position:relative; width:280px; height:280px; margin:0 auto; }
    img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
    .circle { position:absolute; top:-15px; left:-15px; width:310px; height:310px; border:15px solid #eee; border-top:15px solid #ff6b00; border-radius:50%; animation:spin 3s linear forwards; }
    .loading { margin-top:35px; font-style:italic; color:#666; font-size:19px; }
    .check { display:none; font-size:110px; color:#00c853; margin-top:20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="image-container">
      <img src="bum.png">
      <div class="circle"></div>
    </div>
    <div class="loading">Carregando...</div>
    <div class="check">✅</div>
  </div>
</body>
</html>
